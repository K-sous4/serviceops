version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: serviceops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: serviceops
      POSTGRES_USER: serviceops
      POSTGRES_PASSWORD: serviceops
    ports:
      - "5432:5432"
    volumes:
      - serviceops_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serviceops -d serviceops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  serviceops_pg_data:
